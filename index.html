<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人任务与习惯管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF6B6B; /* 粉色/红色系主色调 */
            --background-color: #FFF9F9;
            --card-bg: white;
            --text-color: #333;
            --border-radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --perfect-badge: #4A90E2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-family: 'Patrick Hand', cursive;
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .tab-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* 日历样式 */
        .calendar-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        
        .week-view {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        
        .month-toggle {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .month-toggle-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #666;
        }
        
        .month-view {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 12px;
        }
        
        .calendar-day {
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .calendar-day:hover {
            background: #f0f0f0;
        }
        
        .calendar-day.today {
            background: var(--primary-color);
            color: white;
        }
        
        .calendar-day.selected {
            background: #ffebee;
            border: 2px solid var(--primary-color);
        }
        
        .calendar-day.weekend {
            color: #ff6b6b;
        }
        
        .calendar-day.empty {
            visibility: hidden;
        }
        
        /* 任务列表样式 */
        .tasks-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        
        .task-input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .task-input {
            flex: 1;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
        }
        
        .add-task-btn {
            padding: 8px 16px;
            background: var(--primary-color);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
        }
        
        .task-list {
            list-style: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: var(--border-radius);
            transition: all 0.3s ease;
        }
        
        .task-checkbox {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .task-text {
            flex: 1;
            font-size: 1rem;
        }
        
        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
        }
        
        .task-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        
        .task-action-btn:hover {
            opacity: 1;
        }
        
        /* 习惯卡片样式 */
        .habits-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        
        .habit-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .habit-card {
            background: #f5f5f5;
            border-radius: var(--border-radius);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .habit-card.completed {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }
        
        .habit-icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }
        
        .habit-name {
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .habit-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }
        
        .habit-action-btn {
            padding: 6px 12px;
            background: var(--primary-color);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.85rem;
            color: white;
        }
        
        /* 报表样式 - 全新设计 */
        .reports-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }
        
        /* 报表导航标签 */
        .report-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .report-nav-btn {
            padding: 8px 20px;
            background: #f8f8f8;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: bold;
            position: relative;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1rem;
            color: #666;
        }
        
        .report-nav-btn.active {
            background: #fff0f0;
            color: var(--primary-color);
        }
        
        .report-nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-color);
            border-radius: 2px;
        }
        
        /* 周期选择栏 */
        .period-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #fff0f0;
            border-radius: var(--border-radius);
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        
        .period-nav-btn {
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .period-title {
            font-weight: bold;
        }
        
        .example-badge {
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #666;
        }
        
        /* 周报表样式 */
        .weekly-report {
            margin-bottom: 20px;
        }
        
        .weekly-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.9rem;
            table-layout: fixed; /* 确保列宽均匀分布 */
        }
        
        .weekly-table th,
        .weekly-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #eee;
            vertical-align: middle;
        }
        
        .weekly-table th {
            background: #f8f8f8;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        
        .weekly-table thead th:first-child {
            text-align: left;
            background: #fafafa;
            width: 25%; /* 习惯列占25%宽度 */
        }
        
        .weekly-table thead th:not(:first-child) {
            width: calc(75% / 7); /* 其余7列平均分配75%宽度 */
        }
        
        .habit-name-cell {
            text-align: left;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 100%;
        }
        
        .habit-icon-small {
            font-size: 1.2rem;
        }
        
        .check-cell {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin: 0 auto; /* 居中显示 */
        }
        
        .check-cell:hover {
            transform: scale(1.1);
        }
        
        .check-cell.empty {
            background: #f5f5f5;
        }
        
        .perfect-badge {
            background: var(--perfect-badge);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        /* 数据统计区 */
        .weekly-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
            font-family: 'Nunito', sans-serif;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }
        
        /* 月报表样式 */
        .monthly-report {
            margin-bottom: 20px;
        }
        
        .habit-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .habit-month-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }
        
        .habit-header {
            padding: 15px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .habit-icon-large {
            font-size: 1.5rem;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            padding: 15px;
            background: #fafafa;
        }
        
        .date-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .date-cell:hover {
            transform: scale(1.1);
        }
        
        .date-cell.empty {
            visibility: hidden;
        }
        
        .date-cell.inactive {
            background: #f0f0f0;
            color: #ccc;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f8f8f8;
            border-top: 1px solid #eee;
        }
        
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .days-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }
        
        .days-icon {
            font-size: 1.2rem;
        }
        
        .perfect-text {
            color: #999;
            font-size: 0.8rem;
            font-style: italic;
        }
        
        /* 年报表样式 */
        .yearly-report {
            margin-bottom: 20px;
        }
        
        .habit-year-row {
            display: flex;
            margin-bottom: 20px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }
        
        .habit-info {
            width: 200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: #fafafa;
        }
        
        .habit-icon-year {
            font-size: 2rem;
        }
        
        .year-stats {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-left: 1px solid #eee;
        }
        
        .heat-map {
            display: grid;
            grid-template-columns: repeat(53, 1fr);
            gap: 2px;
            margin-top: 15px;
            background: #fafafa;
            padding: 10px;
            border-radius: var(--border-radius);
        }
        
        .heat-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .heat-cell:hover {
            transform: scale(1.2);
        }
        
        .heat-cell.empty {
            background: white;
            border: 1px solid #eee;
        }
        
        /* 底部操作栏 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            margin-top: 20px;
            box-shadow: var(--shadow);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #666;
            cursor: pointer;
        }
        
        .nav-icon {
            font-size: 1.5rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .habit-cards {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
            
            .habit-cards-grid {
                grid-template-columns: 1fr;
            }
            
            .habit-year-row {
                flex-direction: column;
            }
            
            .habit-info {
                width: 100%;
            }
            
            .year-stats {
                border-left: none;
                border-top: 1px solid #eee;
                padding-top: 15px;
            }
            
            .heat-map {
                grid-template-columns: repeat(53, 6px);
                gap: 1px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .habit-cards {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            }
            
            .weekly-table {
                font-size: 0.8rem;
            }
            
            .check-cell {
                width: 30px;
                height: 30px;
                font-size: 0.7rem;
            }
            
            .period-selector {
                font-size: 1rem;
            }
            
            .period-nav-btn {
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
        }
        
        /* 习惯主题色 */
        .habit-reading { background: linear-gradient(135deg, #a8e6cf, #59c173); }
        .habit-exercise { background: linear-gradient(135deg, #ffaaa5, #ff4e50); }
        .habit-water { background: linear-gradient(135deg, #a3d5d1, #26c6da); }
        .habit-sleep { background: linear-gradient(135deg, #d4a5a5, #8e44ad); }
        .habit-meditation { background: linear-gradient(135deg, #ffd3b6, #ff6b6b); }
        .habit-english { background: linear-gradient(135deg, #a29bfe, #3498db); }
        .habit-contact { background: linear-gradient(135deg, #f9ca5f, #f39c12); }
        
        /* 空单元格样式 */
        .check-cell.empty {
            background: #f5f5f5;
        }
        
        .date-cell.inactive {
            background: #f0f0f0;
            color: #ccc;
        }
        
        .heat-cell.empty {
            background: white;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 个人任务与习惯管理</h1>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="tasks">📝 待办清单</button>
            <button class="tab-btn" data-tab="habits">💪 习惯打卡</button>
            <button class="tab-btn" data-tab="reports">📊 报表统计</button>
            <button class="tab-btn" data-tab="stats">📈 数据统计</button>
        </div>
        
        <!-- 待办清单模块 -->
        <div class="tab-content active" id="tasks-tab">
            <div class="calendar-container">
                <div class="week-view" id="week-view"></div>
                <div class="month-toggle">
                    <button class="month-toggle-btn" id="toggle-month">🔽 展开月视图</button>
                </div>
                <div class="month-view" id="month-view" style="display: none;"></div>
            </div>
            
            <div class="tasks-container">
                <div class="task-input-container">
                    <input type="text" class="task-input" id="new-task-input" placeholder="输入新任务...">
                    <button class="add-task-btn" id="add-task-btn">添加</button>
                </div>
                <ul class="task-list" id="task-list"></ul>
            </div>
        </div>
        
        <!-- 习惯打卡模块 -->
        <div class="tab-content" id="habits-tab">
            <div class="habits-container">
                <div class="habit-cards" id="habit-cards"></div>
                <div class="habit-actions">
                    <button class="habit-action-btn" id="add-habit-btn">➕ 添加习惯</button>
                    <button class="habit-action-btn" id="reset-habits-btn">🔄 重置今日</button>
                </div>
            </div>
        </div>
        
        <!-- 报表统计模块 -->
        <div class="tab-content" id="reports-tab">
            <div class="reports-container">
                <div class="report-nav">
                    <button class="report-nav-btn active" data-report="weekly">周报</button>
                    <button class="report-nav-btn" data-report="monthly">月报</button>
                    <button class="report-nav-btn" data-report="yearly">年报</button>
                </div>
                
                <!-- 周报表 -->
                <div class="weekly-report report-type" data-type="weekly">
                    <div class="period-selector">
                        <button class="period-nav-btn" id="weekly-prev">‹</button>
                        <div class="period-title" id="weekly-period">03/16-03/22</div>
                        <button class="period-nav-btn" id="weekly-next">›</button>
                        <div class="example-badge">示例展示</div>
                    </div>
                    <div class="table-container">
                        <table class="weekly-table" id="weekly-table">
                            <thead>
                                <tr>
                                    <th style="width: 30%;">习惯</th>
                                    <th style="width: 10%;">一</th>
                                    <th style="width: 10%;">二</th>
                                    <th style="width: 10%;">三</th>
                                    <th style="width: 10%;">四</th>
                                    <th style="width: 10%;">五</th>
                                    <th style="width: 10%;">六</th>
                                    <th style="width: 10%;">日</th>
                                </tr>
                            </thead>
                            <tbody id="weekly-body">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                    <div class="weekly-stats" id="weekly-stats">
                        <!-- 动态生成 -->
                    </div>
                </div>
                
                <!-- 月报表 -->
                <div class="monthly-report report-type" data-type="monthly" style="display: none;">
                    <div class="period-selector">
                        <button class="period-nav-btn" id="monthly-prev">‹</button>
                        <div class="period-title" id="monthly-period">2026年3月</div>
                        <button class="period-nav-btn" id="monthly-next">›</button>
                        <div class="example-badge">示例展示</div>
                    </div>
                    <div class="habit-cards-grid" id="monthly-cards">
                        <!-- 动态生成 -->
                    </div>
                </div>
                
                <!-- 年报表 -->
                <div class="yearly-report report-type" data-type="yearly" style="display: none;">
                    <div class="period-selector">
                        <button class="period-nav-btn" id="yearly-prev">‹</button>
                        <div class="period-title" id="yearly-period">2026年</div>
                        <button class="period-nav-btn" id="yearly-next">›</button>
                        <div class="example-badge">示例展示</div>
                    </div>
                    <div id="yearly-rows">
                        <!-- 动态生成 -->
                    </div>
                </div>
                
                <!-- 底部操作栏 -->
                <div class="bottom-nav">
                    <div class="nav-item">
                        <div class="nav-icon">🏠</div>
                        <div>首页</div>
                    </div>
                    <div class="nav-item">
                        <div class="nav-icon">📝</div>
                        <div>记录</div>
                    </div>
                    <div class="nav-item">
                        <div class="nav-icon">👥</div>
                        <div>社群</div>
                    </div>
                    <div class="nav-item">
                        <div class="nav-icon">📊</div>
                        <div>报表</div>
                    </div>
                    <div class="nav-item">
                        <div class="nav-icon">⚙️</div>
                        <div>设置</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 数据统计模块 -->
        <div class="tab-content" id="stats-tab">
            <div class="reports-container">
                <h2 style="margin-bottom: 20px;">📈 全局数据统计</h2>
                <div class="chart-container">
                    <canvas id="stats-chart"></canvas>
                </div>
                <div class="stats-grid" id="global-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total-tasks">0</div>
                        <div class="stat-label">总任务数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="completed-tasks">0</div>
                        <div class="stat-label">已完成任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="task-completion-rate">0%</div>
                        <div class="stat-label">任务完成率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-habit-checks">0</div>
                        <div class="stat-label">总打卡次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="current-streak">0</div>
                        <div class="stat-label">当前连续天数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="longest-streak">0</div>
                        <div class="stat-label">最长连续记录</div>
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button class="add-task-btn" id="export-data-btn">📤 导出数据</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据存储结构
        const storage = {
            tasks: {}, // { 'YYYY-MM-DD': [{id, text, completed}] }
            habits: {}, // { 'YYYY-MM-DD': {habitId: boolean} }
            habitList: [
                { id: 'reading', name: '阅读📚', icon: '📚' },
                { id: 'exercise', name: '运动🏃', icon: '🏃' },
                { id: 'water', name: '喝水💧', icon: '💧' },
                { id: 'sleep', name: '早睡🌙', icon: '🌙' },
                { id: 'meditation', name: '冥想🧘', icon: '🧘' },
                { id: 'english', name: '英语🔤', icon: '🔤' },
                { id: 'contact', name: '联系朋友📞', icon: '📞' }
            ],
            lastResetDate: ''
        };
        
        // 当前选中的日期和报表周期
        let currentSelectedDate = new Date().toISOString().split('T')[0];
        let currentReportType = 'weekly';
        let currentWeekStart = new Date();
        let currentMonth = new Date();
        let currentYear = new Date().getFullYear();
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            checkDailyReset();
            renderCalendar();
            renderTasks();
            renderHabits();
            setupEventListeners();
            updateGlobalStats();
            renderReport();
        });
        
        // 加载数据
        function loadData() {
            const savedData = localStorage.getItem('personalTrackerData');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                Object.assign(storage, parsed);
            }
        }
        
        // 保存数据
        function saveData() {
            localStorage.setItem('personalTrackerData', JSON.stringify(storage));
        }
        
        // 检查每日重置
        function checkDailyReset() {
            const today = new Date().toISOString().split('T')[0];
            if (storage.lastResetDate !== today) {
                // 重置今日习惯为未打卡
                storage.habits[today] = {};
                storage.lastResetDate = today;
                saveData();
            }
        }
        
        // 渲染日历（周视图）
        function renderCalendar() {
            const today = new Date();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1)); // 周一为起始
            
            const weekView = document.getElementById('week-view');
            weekView.innerHTML = '';
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayNum = date.getDate();
                const isToday = dateStr === new Date().toISOString().split('T')[0];
                const isSelected = dateStr === currentSelectedDate;
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                
                const dayElement = document.createElement('div');
                dayElement.className = `calendar-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${isWeekend ? 'weekend' : ''}`;
                dayElement.textContent = dayNum;
                dayElement.dataset.date = dateStr;
                dayElement.addEventListener('click', () => selectDate(dateStr));
                weekView.appendChild(dayElement);
            }
            
            renderMonthView();
        }
        
        // 渲染月视图
        function renderMonthView() {
            const selectedDate = new Date(currentSelectedDate);
            const year = selectedDate.getFullYear();
            const month = selectedDate.getMonth();
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDayOfWeek = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1; // 周一为0
            
            const monthView = document.getElementById('month-view');
            monthView.innerHTML = '';
            
            // 空白占位符
            for (let i = 0; i < startDayOfWeek; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                monthView.appendChild(emptyDay);
            }
            
            // 月份日期
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = date.toISOString().split('T')[0];
                const isToday = dateStr === new Date().toISOString().split('T')[0];
                const isSelected = dateStr === currentSelectedDate;
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                
                const dayElement = document.createElement('div');
                dayElement.className = `calendar-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${isWeekend ? 'weekend' : ''}`;
                dayElement.textContent = day;
                dayElement.dataset.date = dateStr;
                dayElement.addEventListener('click', () => selectDate(dateStr));
                monthView.appendChild(dayElement);
            }
        }
        
        // 选择日期
        function selectDate(dateStr) {
            currentSelectedDate = dateStr;
            renderCalendar();
            renderTasks();
        }
        
        // 切换月视图
        document.getElementById('toggle-month').addEventListener('click', function() {
            const monthView = document.getElementById('month-view');
            const toggleBtn = this;
            if (monthView.style.display === 'none') {
                monthView.style.display = 'grid';
                toggleBtn.textContent = '🔼 收起月视图';
            } else {
                monthView.style.display = 'none';
                toggleBtn.textContent = '🔽 展开月视图';
            }
        });
        
        // 渲染任务列表
        function renderTasks() {
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';
            
            const tasks = storage.tasks[currentSelectedDate] || [];
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.dataset.taskId = task.id;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.addEventListener('change', () => toggleTaskCompletion(task.id));
                
                const span = document.createElement('span');
                span.className = `task-text ${task.completed ? 'completed' : ''}`;
                span.textContent = task.text;
                span.contentEditable = true;
                span.addEventListener('blur', (e) => updateTaskText(task.id, e.target.textContent));
                span.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        e.target.blur();
                    }
                });
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'task-actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'task-action-btn';
                editBtn.innerHTML = '✏️';
                editBtn.title = '编辑';
                editBtn.addEventListener('click', () => {
                    span.focus();
                });
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'task-action-btn';
                deleteBtn.innerHTML = '🗑️';
                deleteBtn.title = '删除';
                deleteBtn.addEventListener('click', () => deleteTask(task.id));
                
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(deleteBtn);
                
                li.appendChild(checkbox);
                li.appendChild(span);
                li.appendChild(actionsDiv);
                taskList.appendChild(li);
            });
        }
        
        // 添加任务
        document.getElementById('add-task-btn').addEventListener('click', addTask);
        document.getElementById('new-task-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });
        
        function addTask() {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if (text) {
                const newTask = {
                    id: Date.now().toString(),
                    text: text,
                    completed: false
                };
                
                if (!storage.tasks[currentSelectedDate]) {
                    storage.tasks[currentSelectedDate] = [];
                }
                storage.tasks[currentSelectedDate].push(newTask);
                saveData();
                renderTasks();
                input.value = '';
                updateGlobalStats();
            }
        }
        
        // 切换任务完成状态
        function toggleTaskCompletion(taskId) {
            const tasks = storage.tasks[currentSelectedDate];
            if (tasks) {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    saveData();
                    renderTasks();
                    updateGlobalStats();
                }
            }
        }
        
        // 更新任务文本
        function updateTaskText(taskId, newText) {
            const tasks = storage.tasks[currentSelectedDate];
            if (tasks) {
                const task = tasks.find(t => t.id === taskId);
                if (task && newText.trim()) {
                    task.text = newText.trim();
                    saveData();
                }
            }
        }
        
        // 删除任务
        function deleteTask(taskId) {
            const tasks = storage.tasks[currentSelectedDate];
            if (tasks) {
                storage.tasks[currentSelectedDate] = tasks.filter(t => t.id !== taskId);
                saveData();
                renderTasks();
                updateGlobalStats();
            }
        }
        
        // 渲染习惯卡片
        function renderHabits() {
            const habitCards = document.getElementById('habit-cards');
            habitCards.innerHTML = '';
            
            const today = new Date().toISOString().split('T')[0];
            const todayHabits = storage.habits[today] || {};
            
            storage.habitList.forEach(habit => {
                const card = document.createElement('div');
                card.className = `habit-card ${todayHabits[habit.id] ? 'completed' : ''}`;
                card.dataset.habitId = habit.id;
                card.addEventListener('click', () => toggleHabit(habit.id));
                
                const icon = document.createElement('div');
                icon.className = 'habit-icon';
                icon.textContent = habit.icon;
                
                const name = document.createElement('div');
                name.className = 'habit-name';
                name.textContent = habit.name;
                
                card.appendChild(icon);
                card.appendChild(name);
                habitCards.appendChild(card);
            });
        }
        
        // 切换习惯打卡状态
        function toggleHabit(habitId) {
            const today = new Date().toISOString().split('T')[0];
            if (!storage.habits[today]) {
                storage.habits[today] = {};
            }
            storage.habits[today][habitId] = !storage.habits[today][habitId];
            saveData();
            renderHabits();
            updateGlobalStats();
        }
        
        // 添加新习惯
        document.getElementById('add-habit-btn').addEventListener('click', () => {
            const name = prompt('请输入习惯名称:');
            const icon = prompt('请输入习惯图标 (如 📚 🏃 💧):', '✅');
            if (name && icon) {
                const newHabit = {
                    id: Date.now().toString(),
                    name: name.trim(),
                    icon: icon.trim()
                };
                storage.habitList.push(newHabit);
                saveData();
                renderHabits();
            }
        });
        
        // 重置今日习惯
        document.getElementById('reset-habits-btn').addEventListener('click', () => {
            const today = new Date().toISOString().split('T')[0];
            storage.habits[today] = {};
            storage.lastResetDate = today;
            saveData();
            renderHabits();
        });
        
        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
                
                // 刷新报表和统计
                if (btn.dataset.tab === 'reports') {
                    renderReport();
                } else if (btn.dataset.tab === 'stats') {
                    updateGlobalStats();
                }
            });
        });
        
        // 报表类型切换
        document.querySelectorAll('.report-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.report-nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.report-type').forEach(r => r.style.display = 'none');
                btn.classList.add('active');
                const reportType = btn.dataset.report;
                document.querySelector(`.report-type[data-type="${reportType}"]`).style.display = 'block';
                currentReportType = reportType;
                renderReport();
            });
        });
        
        // 周期导航按钮事件
        document.getElementById('weekly-prev').addEventListener('click', () => {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            renderReport();
        });
        
        document.getElementById('weekly-next').addEventListener('click', () => {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            renderReport();
        });
        
        document.getElementById('monthly-prev').addEventListener('click', () => {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            renderReport();
        });
        
        document.getElementById('monthly-next').addEventListener('click', () => {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            renderReport();
        });
        
        document.getElementById('yearly-prev').addEventListener('click', () => {
            currentYear--;
            renderReport();
        });
        
        document.getElementById('yearly-next').addEventListener('click', () => {
            currentYear++;
            renderReport();
        });
        
        // 渲染报表
        function renderReport() {
            if (currentReportType === 'weekly') {
                renderWeeklyReport();
            } else if (currentReportType === 'monthly') {
                renderMonthlyReport();
            } else {
                renderYearlyReport();
            }
        }
        
        // 渲染周报表
        function renderWeeklyReport() {
            // 设置周期显示
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(currentWeekStart.getDate() + 6);
            const startStr = `${(currentWeekStart.getMonth() + 1).toString().padStart(2, '0')}/${currentWeekStart.getDate().toString().padStart(2, '0')}`;
            const endStr = `${(weekEnd.getMonth() + 1).toString().padStart(2, '0')}/${weekEnd.getDate().toString().padStart(2, '0')}`;
            document.getElementById('weekly-period').textContent = `${startStr}-${endStr}`;
            
            // 生成表格
            const tbody = document.getElementById('weekly-body');
            tbody.innerHTML = '';
            
            const weekdays = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(currentWeekStart);
                date.setDate(currentWeekStart.getDate() + i);
                weekdays.push(date.toISOString().split('T')[0]);
            }
            
            storage.habitList.forEach(habit => {
                const row = document.createElement('tr');
                
                // 习惯名称单元格
                const nameCell = document.createElement('td');
                nameCell.className = 'habit-name-cell';
                nameCell.innerHTML = `<span class="habit-icon-small">${habit.icon}</span> ${habit.name}`;
                row.appendChild(nameCell);
                
                // 打卡状态单元格（周一到周日）
                let perfectCount = 0;
                for (let i = 0; i < 7; i++) {
                    const dateStr = weekdays[i];
                    const habits = storage.habits[dateStr] || {};
                    const isChecked = habits[habit.id] || false;
                    
                    const cell = document.createElement('td');
                    if (isChecked) {
                        cell.className = `check-cell habit-${habit.id}`;
                        perfectCount++;
                        cell.title = `${dateStr} 已打卡`;
                    } else {
                        cell.className = 'check-cell empty';
                        cell.title = `${dateStr} 未打卡`;
                    }
                    row.appendChild(cell);
                }
                
                tbody.appendChild(row);
            });
            
            // 计算统计数据
            renderWeeklyStats(weekdays);
        }
        
        // 渲染周报统计数据
        function renderWeeklyStats(weekdays) {
            const statsContainer = document.getElementById('weekly-stats');
            statsContainer.innerHTML = '';
            
            // 计算总打卡次数和完美天数
            let totalChecks = 0;
            let perfectDays = 0;
            let maxStreak = 0;
            let currentStreak = 0;
            let perfectHabits = 0; // 全勤习惯数量
            
            // 计算每个习惯的全勤情况
            storage.habitList.forEach(habit => {
                let habitPerfectCount = 0;
                for (let i = 0; i < 7; i++) {
                    const dateStr = weekdays[i];
                    const habits = storage.habits[dateStr] || {};
                    if (habits[habit.id]) {
                        habitPerfectCount++;
                    }
                }
                if (habitPerfectCount === 7) {
                    perfectHabits++;
                }
            });
            
            for (let i = 0; i < 7; i++) {
                const dateStr = weekdays[i];
                const habits = storage.habits[dateStr] || {};
                const dayChecks = Object.values(habits).filter(completed => completed).length;
                totalChecks += dayChecks;
                
                if (dayChecks === storage.habitList.length) {
                    perfectDays++;
                }
                
                // 计算连续打卡
                if (dayChecks > 0) {
                    currentStreak++;
                    maxStreak = Math.max(maxStreak, currentStreak);
                } else {
                    currentStreak = 0;
                }
            }
            
            const completionRate = Math.round((totalChecks / (7 * storage.habitList.length)) * 100);
            
            const stats = [
                { value: `${completionRate}%`, label: '打卡率' },
                { value: perfectDays, label: '完美打卡天数' },
                { value: totalChecks, label: '总完成次数' },
                { value: maxStreak, label: '最高连续打卡天数' },
                { value: perfectHabits, label: '全勤习惯数' }
            ];
            
            stats.forEach(stat => {
                const statCard = document.createElement('div');
                statCard.className = 'stat-card';
                statCard.innerHTML = `
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                `;
                statsContainer.appendChild(statCard);
            });
        }
        
        // 渲染月报表
        function renderMonthlyReport() {
            // 设置周期显示
            const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            document.getElementById('monthly-period').textContent = `${currentMonth.getFullYear()}年${monthNames[currentMonth.getMonth()]}`;
            
            // 生成习惯卡片
            const cardsContainer = document.getElementById('monthly-cards');
            cardsContainer.innerHTML = '';
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            storage.habitList.forEach(habit => {
                const card = document.createElement('div');
                card.className = 'habit-month-card';
                
                // 卡片头部
                const header = document.createElement('div');
                header.className = `habit-header habit-${habit.id}`;
                header.innerHTML = `<span class="habit-icon-large">${habit.icon}</span> ${habit.name}`;
                card.appendChild(header);
                
                // 日历网格
                const calendarGrid = document.createElement('div');
                calendarGrid.className = 'calendar-grid';
                
                const firstDay = new Date(year, month, 1);
                const startDayOfWeek = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1; // 周一为0
                
                // 空白占位符
                for (let i = 0; i < startDayOfWeek; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'date-cell empty';
                    calendarGrid.appendChild(emptyCell);
                }
                
                // 日期单元格
                let checkedDays = 0;
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const dateStr = date.toISOString().split('T')[0];
                    const habits = storage.habits[dateStr] || {};
                    const isChecked = habits[habit.id] || false;
                    
                    const cell = document.createElement('div');
                    if (isChecked) {
                        cell.className = `date-cell habit-${habit.id}`;
                        checkedDays++;
                        cell.title = `${dateStr} 已打卡`;
                    } else {
                        cell.className = 'date-cell inactive';
                        cell.title = `${dateStr} 未打卡`;
                    }
                    cell.textContent = day;
                    calendarGrid.appendChild(cell);
                }
                
                card.appendChild(calendarGrid);
                
                // 卡片底部
                const footer = document.createElement('div');
                footer.className = 'card-footer';
                
                const completionRate = Math.round((checkedDays / daysInMonth) * 100);
                const progressColor = getComputedStyle(document.documentElement).getPropertyValue(`--${habit.id}-color`) || '#FF6B6B';
                
                footer.innerHTML = `
                    <div class="progress-container">
                        <div class="progress-circle habit-${habit.id}">${completionRate}%</div>
                    </div>
                    <div class="days-container">
                        <span class="days-icon">📅</span>
                        <span>${checkedDays}天</span>
                    </div>
                `;
                
                if (checkedDays === daysInMonth) {
                    footer.innerHTML += `<div class="perfect-text">PERFECT</div>`;
                }
                
                card.appendChild(footer);
                cardsContainer.appendChild(card);
            });
        }
        
        // 渲染年报表
        function renderYearlyReport() {
            document.getElementById('yearly-period').textContent = `${currentYear}年`;
            
            const rowsContainer = document.getElementById('yearly-rows');
            rowsContainer.innerHTML = '';
            
            storage.habitList.forEach(habit => {
                const row = document.createElement('div');
                row.className = 'habit-year-row';
                
                // 习惯信息
                const info = document.createElement('div');
                info.className = 'habit-info';
                info.innerHTML = `
                    <div class="habit-icon-year">${habit.icon}</div>
                    <div>${habit.name}</div>
                `;
                row.appendChild(info);
                
                // 年度统计和热力图
                const stats = document.createElement('div');
                stats.className = 'year-stats';
                
                // 计算年度数据
                let checkedDays = 0;
                const totalDays = isLeapYear(currentYear) ? 366 : 365;
                
                for (let month = 0; month < 12; month++) {
                    const daysInMonth = new Date(currentYear, month + 1, 0).getDate();
                    for (let day = 1; day <= daysInMonth; day++) {
                        const dateStr = `${currentYear}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                        const habits = storage.habits[dateStr] || {};
                        if (habits[habit.id]) {
                            checkedDays++;
                        }
                    }
                }
                
                const completionRate = Math.round((checkedDays / totalDays) * 100);
                
                stats.innerHTML = `
                    <div class="progress-container">
                        <div class="progress-circle habit-${habit.id}">${completionRate}%</div>
                    </div>
                    <div class="days-container">
                        <span class="days-icon">📅</span>
                        <span>${checkedDays}天</span>
                    </div>
                `;
                
                row.appendChild(stats);
                
                // 热力图
                const heatMap = document.createElement('div');
                heatMap.className = 'heat-map';
                
                let dateCounter = 0;
                // 创建53周 x 7天 = 371个格子（足够覆盖365/366天）
                for (let i = 0; i < 371; i++) {
                    dateCounter++;
                    if (dateCounter > totalDays) {
                        const emptyCell = document.createElement('div');
                        emptyCell.className = 'heat-cell empty';
                        heatMap.appendChild(emptyCell);
                        continue;
                    }
                    
                    const date = getDateFromDayOfYear(currentYear, dateCounter);
                    const dateStr = date.toISOString().split('T')[0];
                    const habits = storage.habits[dateStr] || {};
                    const isChecked = habits[habit.id] || false;
                    
                    const cell = document.createElement('div');
                    if (isChecked) {
                        cell.className = `heat-cell habit-${habit.id}`;
                        cell.title = `${dateStr} 已打卡`;
                    } else {
                        cell.className = 'heat-cell empty';
                        cell.title = `${dateStr} 未打卡`;
                    }
                    heatMap.appendChild(cell);
                }
                
                row.appendChild(heatMap);
                rowsContainer.appendChild(row);
            });
        }
        
        // 辅助函数：判断是否为闰年
        function isLeapYear(year) {
            return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        }
        
        // 辅助函数：根据年份和一年中的第几天获取日期
        function getDateFromDayOfYear(year, dayOfYear) {
            const date = new Date(year, 0);
            date.setDate(dayOfYear);
            return date;
        }
        
        // 更新全局统计
        function updateGlobalStats() {
            // 计算任务统计
            let totalTasks = 0;
            let completedTasks = 0;
            
            Object.values(storage.tasks).forEach(tasks => {
                totalTasks += tasks.length;
                completedTasks += tasks.filter(task => task.completed).length;
            });
            
            const taskCompletionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            // 计算习惯统计
            let totalHabitChecks = 0;
            let currentStreak = 0;
            let longestStreak = 0;
            
            const today = new Date();
            const dates = Object.keys(storage.habits).sort();
            
            // 总打卡次数
            dates.forEach(date => {
                const habits = storage.habits[date];
                totalHabitChecks += Object.values(habits).filter(completed => completed).length;
            });
            
            // 连续打卡天数
            if (dates.length > 0) {
                let currentStreakCount = 0;
                let maxStreakCount = 0;
                let prevDate = null;
                
                for (const date of dates) {
                    const dateObj = new Date(date);
                    const hasAnyCheck = Object.values(storage.habits[date]).some(completed => completed);
                    
                    if (hasAnyCheck) {
                        if (prevDate) {
                            const prevDateObj = new Date(prevDate);
                            const diffTime = Math.abs(dateObj - prevDateObj);
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            
                            if (diffDays === 1) {
                                currentStreakCount++;
                            } else {
                                maxStreakCount = Math.max(maxStreakCount, currentStreakCount);
                                currentStreakCount = 1;
                            }
                        } else {
                            currentStreakCount = 1;
                        }
                        prevDate = date;
                    }
                }
                
                currentStreak = currentStreakCount;
                longestStreak = Math.max(maxStreakCount, currentStreakCount);
            }
            
            // 更新UI
            document.getElementById('total-tasks').textContent = totalTasks;
            document.getElementById('completed-tasks').textContent = completedTasks;
            document.getElementById('task-completion-rate').textContent = `${taskCompletionRate}%`;
            document.getElementById('total-habit-checks').textContent = totalHabitChecks;
            document.getElementById('current-streak').textContent = currentStreak;
            document.getElementById('longest-streak').textContent = longestStreak;
        }
        
        // 导出数据
        document.getElementById('export-data-btn').addEventListener('click', () => {
            const dataStr = JSON.stringify(storage, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'personal-tracker-data.json';
            link.click();
            URL.revokeObjectURL(url);
        });

    </script>
